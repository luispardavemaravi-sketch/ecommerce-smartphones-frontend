<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestión de Inventario</title>

    <link rel="stylesheet" href="../../assets/css/styles.css" />
  </head>
  <body>
    <main class="admin-inventory">
      <header>
        <h2>Registro de nuevo Smartphone</h2>
      </header>
      <form id="form-register-smartphone" class="grid-form">
        <fieldset>
          <legend>Especificaciones Principales</legend>

          <div class="form-group">
            <label for="marca">Marca del Equipo:</label>
            <select id="marca" name="marca" required>
              <option value="">Seleccione una marca...</option>
              <option value="Xiaomi">Xiaomi</option>
              <option value="Samsung">Samsung</option>
              <option value="Apple">Apple</option>
              <option value="Huawei">Huawei</option>
              <option value="Motorola">Motorola</option>
              <option value="OnePlus">OnePlus</option>
              <option value="Google">Google</option>
              <option value="Otras">Otras</option>
            </select>
          </div>

          <div class="form-group">
            <label for="modelo">Modelo del Equipo:</label>
            <input
              type="text"
              id="modelo"
              name="modelo"
              placeholder="Ej: iPhone 17, Galaxy S21..."
              required
            />
          </div>

          <div class="form-group">
            <label for="precio">Precio de Venta (S/):</label>
            <input
              type="number"
              id="precio"
              name="precio"
              placeholder="Ej: 999.99"
              step="0.01"
              min="0"
              max="999999.99"
              required
            />
          </div>

          <div class="form-group">
            <label for="stock">Unidades en Almacén</label>
            <input
              type="number"
              id="stock"
              name="stock"
              placeholder="Ej: 50"
              min="0"
              step="1"
              required
            />
          </div>
        </fieldset>

        <fieldset>
          <legend>Hardware Y Sistemas</legend>

          <div class="form-group">
            <label for="procesador">Procesador:</label>
            <input
              type="text"
              id="procesador"
              name="procesador"
              placeholder="Ej: Snapdragon 888..."
              required
            />
          </div>

          <div class="form-group">
            <label for="ram">Memoria RAM (GB):</label>
            <select id="ram" name="ram" required>
              <option value="">Seleccione una opción</option>
              <option value="4">4 GB</option>
              <option value="6">6 GB</option>
              <option value="8">8 GB</option>
              <option value="12">12 GB</option>
              <option value="16">16 GB</option>
              <option value="32">32 GB</option>
            </select>
          </div>

          <div class="form-group">
            <label for="almacenamiento">Almacenamiento Interno (GB):</label>
            <select id="almacenamiento" name="almacenamiento" required>
              <option value="">Seleccione una opción</option>
              <option value="64">64 GB</option>
              <option value="128">128 GB</option>
              <option value="256">256 GB</option>
              <option value="512">512 GB</option>
              <option value="1024">1024 GB (1 TB)</option>
            </select>
          </div>

          <div class="form-group">
            <label for="sistema">Sistema Operativo:</label>
            <select id="sistema" name="sistema" required>
              <option value="">Seleccione un sistema operativo...</option>
              <option value="Android">Android</option>
              <option value="iOS">iOS</option>
              <option value="HarmonyOS">HarmonyOS</option>
              <option value="Otros">Otros</option>
            </select>
          </div>

          <div class="form-group">
            <label for="bateria">Capacidad de Batería (mAh):</label>
            <input
              type="number"
              id="bateria"
              name="bateria"
              placeholder="Ej: 4500"
              min="3500"
              max="10000"
              required
            />
          </div>

          <div class="form-group">
            <label for="camara">Resolución de Cámara Principal (MP):</label>
            <input
              type="number"
              id="camara"
              name="camara"
              placeholder="Ej: 108"
              min="12"
              max="200"
              required
            />
          </div>

          <div class="form-group">
            <label for="pantalla">Tamaño de Pantalla (pulgadas):</label>
            <input
              type="number"
              id="pantalla"
              name="pantalla"
              placeholder="Ej: 6.5"
              step="0.1"
              min="4.0"
              max="7.0"
              required
            />
          </div>

          <div class="form-group">
            <label for="conectividad">Conectividad:</label>
            <input
              type="text"
              id="conectividad"
              name="conectividad"
              placeholder="Ej: 5G, Wi-Fi 6..."
              required
            />
          </div>

          <div class="form-group">
            <label for="otros">Otras Especificaciones:</label>
            <textarea
              id="otros"
              name="otros"
              placeholder="Ej: Resistencia al agua, carga rápida..."
              rows="4"
              maxlength="500"
            ></textarea>
          </div>
        </fieldset>
        <div class="form-group button-group">
          <button type="submit" class="btn-submit">Registrar Smartphone</button>
          <button type="reset" class="btn-reset">Limpiar formulario</button>
        </div>
      </form>
    </main>
  </body>
</html>
