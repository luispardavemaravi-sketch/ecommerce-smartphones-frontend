<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registro de Cliente</title>
    <link rel="stylesheet" href="../../assets/css/styles.css" />
  </head>
  <body>
    <main class="admin-inventory">
      <header>Crear cuenta de cliente</header>
      <form id="form-register-client" class="grid-form">
        <fieldset>
          <legend>Datos Personales</legend>

          <div class="form-group">
            <label for="nombre">Nombre Completo:</label>
            <input
              type="text"
              id="nombre"
              name="nombre"
              placeholder="Ej: Luisangel Ronal"
              required
            />
          </div>

          <div class="form-group">
            <label for="apellidos">Apellidos:</label>
            <input
              type="text"
              id="apellidos"
              name="apellidos"
              placeholder="Ej: Pardave Maravi"
              required
            />
          </div>

          <div class="form-group">
            <label for="tipo-documento">Tipo de documento:</label>
            <select id="tipo-documento" name="tipo-documento" required>
              <option value="">Seleccione un tipo de documento...</option>
              <option value="DNI">DNI</option>
              <option value="Pasaporte">Pasaporte</option>
              <option value="Carnet de Extranjería">
                Carnet de Extranjería
              </option>
              <option value="Otros">Otros</option>
            </select>
          </div>

          <div class="form-group">
            <label for="numero-documento">Número de documento:</label>
            <input
              type="text"
              id="numero-documento"
              name="numero-documento"
              placeholder="Ej: 12345678, A1234567..."
              required
            />
          </div>

          <div class="form-group">
            <label for="direccion">Dirección:</label>
            <input
              type="text"
              id="direccion"
              name="direccion"
              placeholder="Ej: Av. Principal 123, Lima"
              required
            />
          </div>

          <div class="form-group">
            <label for="ciudad">Ciudad:</label>
            <input
              type="text"
              id="ciudad"
              name="ciudad"
              placeholder="Ej: Lima"
              required
            />
          </div>
        </fieldset>

        <fieldset>
          <legend>Credenciales de Acceso</legend>

          <div class="form-group">
            <label for="email">Correo Electrónico:</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="Ej: luisangel@example.com"
              required
            />
          </div>

          <div class="form-group">
            <label for="telefono">Telefono Movil</label>
            <input
              type="tel"
              id="telefono"
              name="telefono"
              placeholder="Ej: +51 987654321"
              required
            />
          </div>

          <div class="form-group">
            <label for="password">Contraseña:</label>
            <input
              type="password"
              id="password"
              name="password"
              minlength="8"
              required
            />
          </div>

          <div class="form-group">
            <label for="confirm_password">Confirmar Contraseña:</label>
            <input
              type="password"
              id="confirm_password"
              name="confirm_password"
              minlength="8"
              required
            />
          </div>
        </fieldset>
        <div class="form-group button-group">
          <button type="submit" class="btn-submit">Registrar Cuenta</button>
          <button type="reset" class="btn-reset">Limpiar Datos</button>
        </div>
      </form>
    </main>
  </body>
</html>
